  const locationName = cv(dsr, "A1") || "Unknown";

  // Date parsing — Toast stores as string "3/30/26", Aloha as Date object
  const dateRaw = cv(dsr, "C5");
  let dateStr;
  if (dateRaw instanceof Date) {
    dateStr = fmtDate(dateRaw);
  } else if (dateRaw) {
    // Parse string like "3/30/26"
    const parts = String(dateRaw).split("/");
    if (parts.length === 3) {
      const yr = parts[2].length === 2 ? `20${parts[2]}` : parts[2];
      dateStr = `${parts[0].padStart(2, "0")}/${parts[1].padStart(2, "0")}/${yr}`;
    } else dateStr = String(dateRaw);
  } else dateStr = "Unknown";

  // Approved By — DSR I6 for aloha1/aloha2 (fall back to DCR F8 if blank); DCR F8 for toast
  const approvedBy = posType === "toast" ? cv(dcr, "F8") || "" : cv(dsr, "I6") || cv(dcr, "F8") || "";

  // ── DCR cell map by POS type ──
  // toast:  GF Balance=I4, Proof=I5, PriorDay=I6, TotalCredits=I42, ActualDeposit=I67, TotalDebits=I69, O/S=I71
  // aloha1: GF Balance=I5, Proof=I6, PriorDay=I7, TotalCredits=I45, ActualDeposit=I65, TotalDebits=I67, O/S=I69
  // aloha2: GF Balance=I4, Proof=I5, PriorDay=I6, TotalCredits=I43, ActualDeposit=I67, TotalDebits=I69, O/S=I71
  const dcrMap = posType === "toast" ? {
    gfBal: "I4",
    gfProof: "I5",
    priorDay: "I6",
    totalCreds: "I42",
    actualDep: "I67",
    totalDebs: "I69",
    os: "I71"
  } : posType === "aloha2" ? {
    gfBal: "I4",
    gfProof: "I5",
    priorDay: "I6",
    totalCreds: "I43",
    actualDep: "I67",
    totalDebs: "I69",
    os: "I71"
  } : {
    gfBal: "I5",
    gfProof: "I6",
    priorDay: "I7",
    totalCreds: "I45",
    actualDep: "I65",
    totalDebs: "I67",
    os: "I69"
  };

  // CHECK 1: Safe Count / General Fund
  const gfBalance = cv(dcr, dcrMap.gfBal);
  const gfProof = cv(dcr, dcrMap.gfProof);
  const priorDay = cv(dcr, dcrMap.priorDay);
  summary.gfBalance = gfBalance;
  summary.gfProof = gfProof;
  summary.priorDay = priorDay;
  summary.totalCredits = cv(dcr, dcrMap.totalCreds);
  summary.totalDebits = cv(dcr, dcrMap.totalDebs);
  const overShort = cv(dcr, dcrMap.os);
  summary.overShort = overShort;

  // Borrow/Reimburse cell map by template
  const borrowCell = posType === "aloha1" ? "I17" : "I15";
  const reimburseCell = posType === "aloha1" ? "I49" : posType === "aloha2" ? "I47" : "I46";
  const borrowed = Math.abs(cv(dcr, borrowCell) || 0);
  const reimbursed = Math.abs(cv(dcr, reimburseCell) || 0);
  summary.borrowed = borrowed;
  summary.reimbursed = reimbursed;

  // 1a. GF proof formula correct
  if (gfBalance != null && gfProof != null && Math.abs(gfBalance - gfProof) > 0.02) {
    issues.push({
      severity: "error",
      category: "Safe Count",
      message: `General Fund Balance ($${fmt(gfBalance)}) ≠ Proof ($${fmt(gfProof)}). Variance: $${fmt(Math.abs(gfBalance - gfProof))}.`
    });
  }

  // 1b. GF changed from prior day — must be explained by borrow/reimburse
  if (priorDay != null && gfBalance != null && Math.abs(gfBalance - priorDay) > 0.02) {
    if (borrowed === 0 && reimbursed === 0) {
      issues.push({
        severity: "error",
        category: "General Fund",
        message: `GF Balance ($${fmt(gfBalance)}) differs from Prior Day ($${fmt(priorDay)}) by $${fmt(Math.abs(gfBalance - priorDay))} with no Borrow/Reimburse entry to explain the change.`
      });
    }
  }

  // 1c. Borrow or Reimburse is non-zero — flag for prior day verification
  if (borrowed > 0) {
    issues.push({
      severity: "action",
      category: "General Fund",
      message: `Borrowed from General Fund: $${fmt(borrowed)}. Verify Prior Day balance ($${fmt(priorDay)}) matches what was posted in the prior DSR before approving.`
    });
  }
  if (reimbursed > 0) {
    issues.push({
      severity: "action",
      category: "General Fund",
      message: `Reimbursed to General Fund: $${fmt(reimbursed)}. Verify Prior Day balance ($${fmt(priorDay)}) matches what was posted in the prior DSR before approving.`
    });
  }

  // CHECK 2: Over/Short
  if (overShort != null) {
    const abs = Math.abs(overShort);
    if (abs > OVER_SHORT_THRESHOLD) issues.push({
      severity: "hold",
      category: "Over/Short",
      message: `Over/Short $${fmt(overShort)} exceeds $${OVER_SHORT_THRESHOLD} threshold. Hold for GM review before export.`
    });else if (abs > 0.01) issues.push({
      severity: "warning",
      category: "Over/Short",
      message: `Over/Short $${fmt(overShort)} — within threshold.`
    });
  }

  // CHECK 2b: DSR sales all zero — POS data likely not imported
  // Sum all key sales rows — works for all template types
  const salesSum = ["I11", "I12", "I13", "I14", "I15", "I16", "I17", "I18", "I19", "I20", "I21", "I22", "I23", "I24", "I25", "I26", "I27"].reduce((s, r) => s + Math.abs(cv(dsr, r) || 0), 0);
  if (salesSum === 0) {
    issues.push({
      severity: "error",
      category: "Missing Data",
      message: "All DSR sales entries are $0.00 — POS data was not imported into the DSR. GM must re-import before this can be exported."
    });
  }

  // CHECK 2c: DCR actual deposit blank/zero — Toast only
  // Aloha stores settle cash back into the safe via the GF proof model,
  // so a blank DCR actual deposit is normal and expected for aloha1/aloha2.
  // Toast stores make a physical bank deposit that must always be recorded.
  if (posType === "toast") {
    const dcrActualDepCheck = cv(dcr, dcrMap.actualDep);
    const dsrCashColI = Math.abs(cv(dsr, "I41") || 0);
    const dsrCashTotal = dsrCashColI;
    if ((!dcrActualDepCheck || dcrActualDepCheck === 0) && dsrCashTotal > 0) {
      issues.push({
        severity: "error",
        category: "Missing Deposit",
        message: `DCR Actual Deposit is blank/zero but DSR shows cash of $${fmt(dsrCashTotal)} collected. GM must enter the actual deposit amount in the DCR before export.`
      });
    }
  }

  // CHECK 3: Deposit Match
  // toast:  DSR I41 vs Toast All Day D50 (Cash Amount)
  // aloha1: DSR I42 vs DCR I65
  // aloha2: DSR I38 vs Aloha PDF deposit O/S (DCR actual deposit is a combined fund figure, not comparable)
  let dsrDep, dcrDep, depositLabel;
  if (posType === "toast") {
    // DSR cash deposit: find row with GL 2680 and "Cash Deposit" in col C, read col I
    // Dynamic — row can vary by location
    let toastDsrDepRow = null;
    if (dsr && dsr["!ref"]) {
      const dRange = window.XLSX.utils.decode_range(dsr["!ref"]);
      for (let r = dRange.s.r; r <= dRange.e.r; r++) {
        const bCell = dsr[window.XLSX.utils.encode_cell({
          r,
          c: 1
        })];
        const cCell = dsr[window.XLSX.utils.encode_cell({
          r,
          c: 2
        })];
        const bVal = bCell ? String(bCell.v || "") : "";
        const cVal = cCell ? String(cCell.v || "").toLowerCase() : "";
        if ((bVal === "2680" || Number(bVal) === 2680) && cVal.includes("cash deposit")) {
          toastDsrDepRow = r;
          break;
        }
      }
    }
    dsrDep = toastDsrDepRow !== null ? (() => {
      const cell = dsr[window.XLSX.utils.encode_cell({
        r: toastDsrDepRow,
        c: 8
      })];
      return cell ? Number(cell.v) || 0 : null;
    })() : cv(dsr, "I41");

    // Toast Cash Amount: find "Cash" row in Toast All Day, col D (index 3)
    // Will be read after toastAllDay analysis — use summary.toastCashAmount set above
    // For now set dcrDep to null; it gets filled after Toast All Day is parsed
    dcrDep = null; // filled below after Toast All Day parsing
    depositLabel = "Toast All Day";
  } else if (posType === "aloha2") {
    // For aloha2, col I of cash row may be Ziosk-only if col G = "Ziosk"
    // Col J holds the total actual deposit — use that when present
    const aloha2ColJ = dsr["J38"] ? Number(dsr["J38"].v) || null : null;
    const aloha2ColI = cv(dsr, "I38");
    // KickFin locations: col J = actual bank deposit (matches PDF deposit O/S)
    //   Tips are paid electronically, so the full Ziosk cash hits the bank
    //   Col J may differ from col I when change orders or GF activity are present
    // Non-KickFin locations: col I = Ziosk cash settlement (matches PDF deposit O/S)
    //   Col J is lower because tips were paid out from the physical cash before deposit
    // hasKickFin is determined from the DSR credits section (GL 2390 presence)
    // NOTE: hasKickFin is set later in CHECK E, so we detect it here directly
    let aloha2HasKickFin = false;
    if (dsr && dsr["!ref"]) {
      const kkRange = window.XLSX.utils.decode_range(dsr["!ref"]);
      for (let rr = kkRange.s.r; rr <= kkRange.e.r; rr++) {
        const glCell = dsr[window.XLSX.utils.encode_cell({
          r: rr,
          c: 1
        })];
        if (glCell && Number(glCell.v) === 2390) {
          const valCell = dsr[window.XLSX.utils.encode_cell({
            r: rr,
            c: 8
          })];
          if (valCell && Number(valCell.v) > 0) aloha2HasKickFin = true;
          break;
        }
      }
    }
    dsrDep = aloha2HasKickFin ? aloha2ColJ != null && Math.abs(aloha2ColJ) > 0 ? aloha2ColJ : aloha2ColI : aloha2ColI;
    summary.aloha2ActualBankDep = aloha2ColJ;
    dcrDep = alohaData && alohaData.depositOS != null ? alohaData.depositOS : null;
    depositLabel = "Aloha Sales Report";
  } else {
    dsrDep = cv(dsr, "I42");
    dcrDep = cv(dcr, dcrMap.actualDep);
    depositLabel = "DCR Actual Deposit";
  }
  summary.dsrCashDeposit = dsrDep;
  summary.dcrActualDeposit = dcrDep;
  summary.depositLabel = depositLabel;
  summary.paidInTotal = 0; // will be overwritten by Toast All Day parsing if applicable

  // CHECK 3b (Toast): DCR Actual Deposit == Total Credits - Other Paid Outs
  // CHECK 3a (Toast deposit vs Toast Cash) runs inside the Toast All Day parsing block below
  // because it needs toastCashAmount which isn't available yet
  if (posType === "toast") {
    const dcrTotalCredits = cv(dcr, dcrMap.totalCreds);
    const dcrActualDep = cv(dcr, dcrMap.actualDep);
    let paidOutSum = 0;
    for (let r = 59; r <= 63; r++) {
      const cell = dcr[`I${r}`];
      if (cell && cell.v) paidOutSum += Math.abs(Number(cell.v) || 0);
    }
    summary.dcrPaidOutSum = paidOutSum;
    if (dcrTotalCredits != null && dcrActualDep != null && dcrActualDep > 0) {
      const expectedActual = (dcrTotalCredits || 0) - paidOutSum;
      const depDiff = Math.abs(dcrActualDep - expectedActual);
      if (depDiff > 1.00) {
        const osAbs = Math.abs(overShort || 0);
        const explainedByOS = Math.abs(depDiff - osAbs) < 0.02;
        issues.push({
          severity: explainedByOS ? "warning" : "error",
          category: "DCR Deposit",
          message: `DCR Actual Deposit $${fmt(dcrActualDep)} ≠ Total Credits $${fmt(dcrTotalCredits)} − Paid Outs $${fmt(paidOutSum)} = $${fmt(expectedActual)}. Variance: $${fmt(depDiff)}${explainedByOS ? " (matches Over/Short — accounted for)" : ""}.`
        });
      }
    }
  } else if (dsrDep != null && dcrDep != null) {
    const diff = Math.abs(Math.abs(dsrDep) - Math.abs(dcrDep));
    if (diff > 1.00) issues.push({
      severity: "error",
      category: "Deposit Match",
      message: `Cash deposit mismatch: DSR $${fmt(Math.abs(dsrDep))} vs ${depositLabel} $${fmt(Math.abs(dcrDep))}. Variance: $${fmt(diff)}.`
    });else if (diff > 0.01) issues.push({
      severity: "warning",
      category: "Deposit Match",
      message: `Minor cash deposit variance $${fmt(diff)} (DSR vs ${depositLabel}).`
    });
  }
  if (posType !== "toast" && (dcrDep == null || dcrDep === 0) && Math.abs(dsrDep || 0) > 0) issues.push({
    severity: "warning",
    category: "Deposit Match",
    message: `Aloha PDF deposit not found — DSR shows $${fmt(Math.abs(dsrDep || 0))}. If the PDF uploaded is a scanned image, the tool will automatically OCR it. If no PDF has been uploaded, upload the Aloha Sales Report PDF to complete this check.`
  });

  // CHECK 4: Paid Out GL codes
  // Toast paid outs: DCR rows 59-63, col B=GL, col C=desc(?), col I=amt
  // Aloha paid outs: DCR rows 57-61, col B=GL, col D=desc, col I=amt
  // aloha2 and toast share the same paid-out row positions (59-63)
  // aloha1 uses rows 57-61 with desc in col D
  // aloha2/toast use rows 59-63 with desc in col D

  // GL_KEYWORDS defined at module scope
  function checkPaidOutCoding(gl, desc) {
    if (!desc || !gl) return null;
    const glNum = parseInt(gl);
    const rule = GL_KEYWORDS[glNum];
    if (!rule) return null;
    const d = desc.toLowerCase();
    const badHits = rule.bad.filter(k => d.includes(k));
    if (badHits.length > 0) {
      let suggest = null;
      for (const [ogl, orule] of Object.entries(GL_KEYWORDS)) {
        if (Number(ogl) === glNum) continue;
        if (orule.ok.some(k => d.includes(k))) {
          suggest = `GL ${ogl} (${orule.label})`;
          break;
        }
      }
      return `"${desc}" may be miscoded to GL ${glNum} (${rule.label}) — "${badHits[0]}" suggests ${suggest || "a different GL"}.`;
    }
    // Flag multiple categories in one entry
    const cats = Object.entries(GL_KEYWORDS).filter(([, r]) => r.ok.some(k => d.includes(k))).map(([, r]) => r.label);
    if (cats.length > 1) {
      return `"${desc}" may contain multiple cost categories (${cats.join(", ")}). Consider splitting into separate line items.`;
    }
    return null;
  }
  const paidOutDefs = posType === "aloha1" ? [{
    gl: "B57",
    desc: "D57",
    amt: "I57"
  }, {
    gl: "B58",
    desc: "D58",
    amt: "I58"
  }, {
    gl: "B59",
    desc: "D59",
    amt: "I59"
  }, {
    gl: "B60",
    desc: "D60",
    amt: "I60"
  }, {
    gl: "B61",
    desc: "D61",
    amt: "I61"
  }] : [{
    gl: "B59",
    desc: "D59",
    amt: "I59"
  }, {
    gl: "B60",
    desc: "D60",
    amt: "I60"
  }, {
    gl: "B61",
    desc: "D61",
    amt: "I61"
  }, {
    gl: "B62",
    desc: "D62",
    amt: "I62"
  }, {
    gl: "B63",
    desc: "D63",
    amt: "I63"
  }];
  const paidOuts = [];
  for (const r of paidOutDefs) {
    const gl = cv(dcr, r.gl);
    const desc = cv(dcr, r.desc);
    const amt = cv(dcr, r.amt);
    if (gl && amt && Math.abs(Number(amt)) > 0) paidOuts.push({
      gl: Number(gl),
      desc: String(desc || ""),
      amt: Number(amt)
    });
  }
  summary.paidOuts = paidOuts;
  for (const po of paidOuts) {
    const coaName = CHART_OF_ACCOUNTS[po.gl] || null;
    if (INVALID_PAIDOUT_GL.has(po.gl)) {
      const acctType = po.gl < 2000 ? "asset" : po.gl < 3000 ? "liability" : po.gl < 4000 ? "equity" : "revenue";
      issues.push({
        severity: "error",
        category: "Paid Out GL",
        message: `Paid out $${fmt(po.amt)} → GL ${po.gl} "${coaName || po.desc}" is a ${acctType} account — not valid for paid outs.`
      });
    } else if (!COA_CODES.has(po.gl)) {
      issues.push({
        severity: "error",
        category: "Paid Out GL",
        message: `Paid out $${fmt(po.amt)} → GL ${po.gl} ("${po.desc}") does not exist in the Chart of Accounts.`
      });
    }
    // Check GL coding accuracy against description keywords
    const codingWarn = checkPaidOutCoding(po.gl, po.desc);
    if (codingWarn) {
      issues.push({
        severity: "warning",
        category: "Paid Out GL",
        message: `GL coding: ${codingWarn}`
      });
    }
    // If in COA and in expense range (5000+), it's valid — no issue
  }

  // Approved By check removed — not required

  // CHECK 6: Sales cross-reference
  let salesComparisons = [];
  if (posType === "toast" && toastAllDay) {
    var _toastCats$Food, _toastCats$BottledBe, _toastCats$DraftBeer, _toastCats$Wine, _toastCats$Liquor, _toastCats$Tequila, _toastCats$BottleWat, _toastAllDay$B;
    // ── Dynamic label-based row search ──
    // Toast All Day rows are NOT static — search by label in col A or B
    function findToastRow(labelText) {
      const range = toastAllDay["!ref"];
      if (!range) return null;
      const decoded = window.XLSX.utils.decode_range(range);
      for (let r = decoded.s.r; r <= decoded.e.r; r++) {
        const aCell = toastAllDay[window.XLSX.utils.encode_cell({
          r,
          c: 0
        })];
        const bCell = toastAllDay[window.XLSX.utils.encode_cell({
          r,
          c: 1
        })];
        const aVal = aCell ? String(aCell.v || "").trim() : "";
        const bVal = bCell ? String(bCell.v || "").trim() : "";
        if (aVal === labelText || bVal === labelText) return r;
      }
      return null;
    }
    function toastVal(r, col) {
      if (r === null) return 0;
      const cell = toastAllDay[window.XLSX.utils.encode_cell({
        r,
        c: col
      })];
      return cell ? Number(cell.v) || 0 : 0;
    }

    // Paid in total (Revenue Summary section) — col A label, col B value
    const paidInRow = findToastRow("Paid in total");
    const paidInTotal = paidInRow !== null ? toastVal(paidInRow, 1) : 0;
    summary.paidInTotal = paidInTotal;

    // Cash payment row (Payments Summary section) — col A="Cash", col D=Amount
    const cashRow = findToastRow("Cash");
    const toastCashRaw = cashRow !== null ? toastVal(cashRow, 3) : null;

    // Cash adjustments (e.g. refunds pulled from drawer, vault pulls)
    // Located in Cash Activity section — "Cash adjustments" row, col B value
    const cashAdjRow = findToastRow("Cash adjustments");
    const cashAdjustment = cashAdjRow !== null ? toastVal(cashAdjRow, 1) : 0;

    // Effective cash = raw cash + adjustment (adjustment is typically negative)
    const toastCashAmount = toastCashRaw != null ? toastCashRaw + cashAdjustment : null;
    summary.toastCashAmount = toastCashAmount;
    summary.toastCashRaw = toastCashRaw;
    summary.cashAdjustment = cashAdjustment;

    // CHECK 3a: DSR deposit vs Toast Cash
    // Three things can explain a difference between DSR and Toast Cash raw:
    //   1. Cash adjustment = paid out from drawer (DSR == raw, adj == DCR paid outs)
    //   2. Cash adjustment = vault pull/refund (DSR == adjusted, action req'd for DCR)
    //   3. Health Insurance collected (adds to Toast cash, recorded as DCR Paid In GL 7010)
    //   4. Paid In Total (adds to Toast cash, action req'd for DCR GL 8570)
    const dsrAbs = Math.abs(dsrDep || 0);
    const hiAmount = Math.abs(cv(dcr, "I29") || 0);
    summary.hiAmount = hiAmount;

    // Sum DCR Other Paid Outs (rows 59-63) to check if cash adj is explained by them
    let dcrPaidOutTotal = 0;
    for (let r = 59; r <= 63; r++) {
      const cell = dcr[`I${r}`];
      if (cell && cell.v) dcrPaidOutTotal += Math.abs(Number(cell.v) || 0);
    }
    if (toastCashAmount != null) {
      dcrDep = toastCashRaw; // Use raw for display — adjustment handled separately
      summary.dcrActualDeposit = toastCashRaw;

      // Check Scenario B first: DSR == raw Toast cash (adj explained by DCR paid outs)
      const diffRaw = Math.abs(dsrAbs + paidInTotal + hiAmount - (toastCashRaw || 0));
      const adjExplainedByPaidOut = cashAdjustment !== 0 && Math.abs(Math.abs(cashAdjustment) - dcrPaidOutTotal) < 0.02;
      if (diffRaw <= 1.00 && adjExplainedByPaidOut) {
        // DSR matches raw cash AND the adjustment is fully explained by DCR paid outs → pass
        if (diffRaw > 0.01) issues.push({
          severity: "warning",
          category: "Deposit Match",
          message: `Minor cash deposit variance $${fmt(diffRaw)} between DSR and Toast All Day.`
        });
        // Flag the adjustment as informational
        if (Math.abs(cashAdjustment) > 0.01) issues.push({
          severity: "action",
          category: "Cash Adjustment",
          message: `Toast Cash Adjustment $${fmt(Math.abs(cashAdjustment))} matches DCR paid out total — correctly recorded. Verify GL coding on paid outs before export.`
        });
      } else {
        // Scenario A or mismatch: compare DSR against adjusted Toast cash
        const expected = dsrAbs + paidInTotal + hiAmount;
        const diff = Math.abs(expected - (toastCashAmount || 0));
        const adjNote = cashAdjustment !== 0 ? ` (Toast Cash $${fmt(toastCashRaw)} ${cashAdjustment < 0 ? "−" : "+"} Adj $${fmt(Math.abs(cashAdjustment))} = $${fmt(toastCashAmount)})` : "";
        const hiNote = hiAmount > 0 ? ` + HI $${fmt(hiAmount)}` : "";
        if (diff > 1.00) issues.push({
          severity: "error",
          category: "Deposit Match",
          message: `Cash deposit mismatch: DSR $${fmt(dsrAbs)}${hiNote}${paidInTotal > 0 ? ` + Paid In $${fmt(paidInTotal)}` : ""} vs Toast Cash $${fmt(toastCashAmount)}${adjNote}. Variance: $${fmt(diff)}.`
        });else if (diff > 0.01) issues.push({
          severity: "warning",
          category: "Deposit Match",
          message: `Minor cash deposit variance $${fmt(diff)} between DSR and Toast All Day.`
        });
        // Cash adjustment not explained by paid outs → flag for DCR entry
        if (Math.abs(cashAdjustment) > 0.01 && !adjExplainedByPaidOut) issues.push({
          severity: "action",
          category: "Cash Adjustment",
          message: `Toast Cash Adjustment of $${fmt(Math.abs(cashAdjustment))} detected. DSR cash deposit should reflect adjusted amount ($${fmt(toastCashAmount)}). Enter adjustment in DCR Other Paid Out's with appropriate GL code.`
        });
      }
      if (paidInTotal > 0.01) issues.push({
        severity: "action",
        category: "Paid In Total",
        message: `Toast "Paid in total" of $${fmt(paidInTotal)} detected. Per audit procedure: add to DCR Other Paid In's coded to GL 8570 (Cashier's Over/Short) before export.`
      });
      if (hiAmount > 0.01) issues.push({
        severity: "action",
        category: "Health Insurance",
        message: `Health Insurance collected: $${fmt(hiAmount)} (GL 7010) included in Toast cash. Verify entered in DCR Paid In's before export.`
      });
      if (paidInTotal > 0.01) issues.push({
        severity: "action",
        category: "Paid In Total",
        message: `Toast "Paid in total" of $${fmt(paidInTotal)} detected. Per audit procedure: add to DCR Other Paid In's coded to GL 8570 (Cashier's Over/Short) before export.`
      });
      // Flag cash adjustment — GM needs to enter it in DCR Other Paid Outs
      if (Math.abs(cashAdjustment) > 0.01) issues.push({

function downloadCSV(content, filename) {
  const blob = new Blob([content], {
    type: "text/csv;charset=utf-8;"
  });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}
